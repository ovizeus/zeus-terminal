name: Test

# Deployment is MANUAL (pm2 reload on the VPS at /opt/zeus-terminal). The old
# auto-deploy job was removed 2026-06-26: it targeted /root/zeus-terminal (the
# app lives at /opt/zeus-terminal) and health-checked /health (the app serves
# /api/health), so it could never have worked — and we never used it. CI is now
# just a fast, deterministic sanity gate on the core money-path logic.

# Auto-triggers (push/pull_request) DISABLED 2026-06-26: GitHub stopped
# provisioning ANY hosted runner for this account (the job fails in ~2s with an
# empty runner_name and zero steps, regardless of the runs-on label) — an
# Actions billing / enablement issue at the GitHub ACCOUNT level, not the
# workflow. Until that is resolved in GitHub Settings (Billing + repo Actions),
# every push produced a red email for nothing. Left as workflow_dispatch so it
# can still be run manually once the account issue is fixed; then restore the
# push/pull_request triggers.
on:
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # npm install (not ci) + no cache: tolerant install. The old `npm ci` +
      # `cache: npm` combo failed in ~2s on every run (before tests). npm install
      # reconciles instead of hard-failing on any lock edge case.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Deterministic core (ML-DSL + ARES + DSL). The full 552-file suite
      # includes e2e/integration/live tests that need a running server, the live
      # DB and a real exchange — those cannot pass on a clean runner, so they run
      # locally, not in CI. See package.json test:ci.
      - name: Run CI tests
        env:
          NODE_ENV: production
        run: npm run test:ci
