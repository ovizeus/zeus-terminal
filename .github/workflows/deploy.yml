name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-fund

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run tests
        env:
          NODE_ENV: production
        run: npm test -- --no-coverage --testPathIgnorePatterns="executeLiveEntryCore"

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Setup SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/deploy_key
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          # [OPS-4] Capture pre-deploy SHA for rollback. [OPS-8] Compute and
          # assert client bundle hash post-build to detect mismatched deploy.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} '
            cd /root/zeus-terminal &&
            PREV_SHA=$(git rev-parse HEAD) &&
            echo "[OPS-4] Pre-deploy SHA: $PREV_SHA" &&
            git fetch origin main &&
            git reset --hard origin/main &&
            npm ci --production --no-audit --no-fund &&
            if [ -f public/app/index.html ]; then
              BUNDLE_HASH=$(sha256sum public/app/index.html | awk "{print \$1}") &&
              echo "[OPS-8] Bundle hash post-build: $BUNDLE_HASH"
            else
              echo "[OPS-8] WARN: public/app/index.html missing — bundle assertion skipped"
            fi &&
            pm2 reload zeus --update-env &&
            sleep 3 &&
            if ! curl -sf http://localhost:3000/health; then
              echo "[OPS-4] HEALTH FAIL — rolling back to $PREV_SHA" &&
              git reset --hard $PREV_SHA &&
              pm2 reload zeus --update-env &&
              sleep 3 &&
              curl -sf http://localhost:3000/health || (echo "[OPS-4] ROLLBACK ALSO FAILED — manual intervention required" && exit 2) &&
              echo "[OPS-4] Rollback successful" &&
              exit 1
            fi
          '

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
