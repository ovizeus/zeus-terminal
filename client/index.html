<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <!-- [BUG-MOB-1] PWA meta tags — standard + iOS legacy. Both required: Chrome deprecates apple-* but iOS Safari still needs it. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zeus Terminal" />
    <link rel="apple-touch-icon" href="/assets/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Zeus Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script>
      // FOUC prevention — restore theme before first paint
      try{var t=localStorage.getItem('zeus_theme');if(t&&t!=='native')document.documentElement.setAttribute('data-theme',t)}catch(e){}
    </script>
    <link rel="stylesheet" href="/themes.css" />
    <style>
      /* [SPLASH 2026-06-10] Static boot splash — big centered ZT logo instead
         of a black page. Lives INSIDE #root so React's first render replaces
         it seamlessly (App.tsx shows the same logo while auth loads). */
      .zt-splash {
        position: fixed; inset: 0; display: flex;
        align-items: center; justify-content: center;
        background: #0a0a0f;
      }
      .zt-splash img {
        width: min(68vw, 320px); height: auto;
        animation: zt-splash-pulse 1.6s ease-in-out infinite;
        /* radial fade: melts the icon's square canvas into the page black —
           no visible "picture frame" edge around the emblem */
        -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 56%, transparent 74%);
        mask-image: radial-gradient(circle at 50% 50%, #000 56%, transparent 74%);
      }
      @keyframes zt-splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.72; transform: scale(0.96); }
      }
    </style>
  </head>
  <body>
    <div id="root"><div class="zt-splash"><img src="/assets/icon-512.png" alt="Zeus Terminal" /></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
