ext {
    minSdkVersion = 24
    compileSdkVersion = 36
    // [MOB-5b 2026-06-11] targetSdk 36 was AHEAD of Capacitor 8's supported 35,
    // the surface where Android's predictive-back / OnBackInvokedCallback change
    // stops the legacy hardware-back from dispatching at root (Capacitor's
    // App.addListener('backButton') relies on it). Align to Capacitor 8's tested
    // target. compileSdk stays 36 (>= target is fine). Needs on-device confirm.
    targetSdkVersion = 35
    androidxActivityVersion = '1.11.0'
    androidxAppCompatVersion = '1.7.1'
    androidxCoordinatorLayoutVersion = '1.3.0'
    androidxCoreVersion = '1.17.0'
    androidxFragmentVersion = '1.8.9'
    coreSplashScreenVersion = '1.2.0'
    androidxWebkitVersion = '1.14.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.3.0'
    androidxEspressoCoreVersion = '3.7.0'
    cordovaAndroidVersion = '14.0.1'
}